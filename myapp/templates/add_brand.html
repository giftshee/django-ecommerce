{% extends "base.html" %}

{% block title %}Add Brand{% endblock %}

{% block content %}
<div class="container mt-4">
  <h1>Add New Brand</h1>

  {% if messages %}
    <div>
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}

  <form method="post" class="mt-3">
    {% csrf_token %}
    <div class="mb-3">
      <label for="name" class="form-label">Name</label>
      <input type="text" id="name" name="name" class="form-control" value="{{ name|default:'' }}" required>
    </div>

    <div class="mb-3">
      <label for="description" class="form-label">Description</label>
      <textarea id="description" name="description" class="form-control" rows="4">{{ description|default:'' }}</textarea>
    </div>

    <button type="submit" class="btn btn-success">Add Brand</button>
    <a href="{% url 'myapp:category' %}" class="btn btn-secondary ms-2">Cancel</a>
  </form>
</div>
{% endblock %}
